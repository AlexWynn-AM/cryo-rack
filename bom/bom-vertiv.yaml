  - assembly: rack-utilities
    part: Horizontal Cable Manager (1U)
    pn: VRA1002
    vendor: Vertiv
    url: https://www.vertiv.com/en-us/products-catalog/facilities-enclosures-and-racks/racks-and-containment/vertiv-vr-rack-accessories/
    qty: 2
    unit_cost_usd: 50
    lead_time_weeks: 1
    stage: "300K"
    status: planned
    notes: >
      Vertiv VRA1002: 1U x 4" deep horizontal cable manager, single-sided
      with cover. Place between instrument groups to route DC wiring,
      thermocouple leads, and vacuum gauge cables cleanly. Keeps signal
      wiring separated from power cables — matters for low-noise readout.

  - assembly: rack-utilities
    part: Blanking Panel Kit
    pn: VRA2002
    vendor: Vertiv
    url: https://www.vertiv.com/en-us/products-catalog/facilities-enclosures-and-racks/racks-and-containment/vertiv-vr-rack-accessories---airflow-management/
    qty: 1
    unit_cost_usd: 30
    lead_time_weeks: 1
    stage: "300K"
    status: planned
    notes: >
      Vertiv VRA2002: Sheet metal blanking panel kit — includes 1U, 2U,
      4U, and 8U panels (1 each). Fill unused rack space above/below
      instruments. Clean look for demo, and prevents dust from settling
      on exposed vacuum hardware.

  - assembly: rack-utilities
    part: UPS (Online Double-Conversion, 1500VA)
    pn: GXT5-1500LVRT2UXL
    vendor: Vertiv (Liebert)
    url: https://www.vertiv.com/en-us/products-catalog/critical-power/uninterruptible-power-supplies-ups/vertiv-liebert-gxt5-ups-500-3000va-120v-ups/
    qty: 1
    unit_cost_usd: 800
    lead_time_weeks: 1
    stage: "300K"
    status: planned
    notes: >
      Vertiv Liebert GXT5-1500LVRT2UXL: 1500VA / 1350W, 120V, online
      double-conversion, 2U rack/tower. 6x NEMA 5-15R outlets. Input
      range 60–150 VAC.
      TOPOLOGY: Online double-conversion = power ALWAYS goes through
      rectifier → DC battery bus → inverter. Mains AC never passes
      straight to output. This makes the UPS an effective isolation
      stage for line transients and common-mode noise, and provides
      seamless ride-through during outages.
      GROUNDING: The UPS output neutral is bonded to chassis ground
      (NEC requirement), so it does NOT provide true galvanic isolation
      from building earth. The downstream isolation transformer (IS500HG)
      is what breaks the galvanic path and defines the isolated
      measurement ground. The two work in series: UPS cleans the power,
      iso xfmr breaks the ground.
      DOMAIN 2 ONLY: Feeds the isolation transformer, which feeds
      readout electronics. Do NOT put the compressor on the UPS —
      1.5 kW steady draw exceeds UPS capacity and the compressor must
      remain earth-grounded (Domain 1) per ADR-004.
      A power blip mid-cooldown means hours of lost time re-cooling.
      Li-Ion variant: GXT5LI-1500LVRT2UXLN (lighter, 5-yr battery
      warranty, includes network card).
