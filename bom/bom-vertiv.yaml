# Vertiv Site-Specific BOM Overrides
# Inherits from bom.yaml. Only list items that differ or are unique to the Vertiv deployment.

site: Vertiv
base: bom.yaml
revision: "0.1"
date: "2026-03-10"

notes: >
  Vertiv demo system. Vertiv may supply rack infrastructure, power distribution,
  and cooling water. Confirm what they provide vs what we bring.

# ===========================================================================
# POWER & GROUNDING ARCHITECTURE  (implements ADR-004 Option B)
# ===========================================================================
# Two ground domains, single well-defined interface. See ADR-004 for rationale.
#
# DOMAIN 1 — Earth Ground (compressor / infrastructure)
#   Wall 20A/120V → PDU (VP8830) → compressor, turbo pump, vacuum gauge
#   Ground path: building mains earth → PDU chassis → compressor chassis →
#   SS flex lines → cold head body → vacuum jacket → rack chassis.
#   Carries compressor motor currents (~1 Hz GM valve transients).
#   NO measurement signals on this domain.
#
# DOMAIN 2 — Isolated Measurement Ground (readout chain)
#   Wall 20A/120V → PDU (VP8830) → UPS (GXT5, online double-conversion) →
#   Isolation transformer (IS500HG, Faraday-shielded) → readout electronics
#   Ground path: IS500HG secondary → readout ground bus → DC feedthrough
#   pins (ceramic-sealed, isolated from flange) → PhBr wires → Cu backplane
#   at 4 K → AQFP circuit ground.
#   Carries only signal and bias currents.
#
# The UPS and isolation transformer are in series on Domain 2:
#   - UPS (GXT5): AC→rectifier→DC battery bus→inverter→AC. Power always
#     traverses the battery bus — never passes mains through. Provides
#     ride-through for outages, line conditioning (clean sine), and
#     common-mode transient rejection. NOTE: output neutral is bonded to
#     chassis/earth ground per NEC — the UPS alone does NOT break the
#     galvanic path to building earth.
#   - Isolation transformer (IS500HG): Faraday-shielded winding provides
#     true galvanic isolation. THIS is the component that defines the
#     isolated measurement ground reference. Leakage current < 100 µA.
#
# ISOLATION INTERFACES (Domain 1 ↔ Domain 2 boundary):
#   4 K:   Alumina disk (Al₂O₃) between cold finger and Cu backplane,
#          indium foil both faces. Breaks galvanic path through cryocooler.
#   300 K: Ceramic-to-metal seals in hermetic feedthroughs — pins are
#          isolated from flange body by design. No coax shield or cable
#          braid may connect to the flange housing.
#   300 K: Isolation transformer secondary defines Domain 2 ground.
#
# CRITICAL ASSEMBLY RULES:
#   - Compressor plugs into PDU DIRECTLY (Domain 1). Never behind UPS.
#   - Readout electronics plug into isolation transformer ONLY (Domain 2).
#   - Temperature controller (Cryocon 22C) may go on either domain:
#     Domain 2 (behind UPS+iso xfmr) if it shares ground with readout,
#     Domain 1 if heater output connects to cryostat body. Confirm wiring.
#   - Turbo pump + vacuum gauge → PDU direct (Domain 1). Earth-grounded,
#     no measurement signals.
#   - NO cable shield, ground lug, debug probe, or scope ground clip may
#     touch cryostat body, vacuum jacket, or rack chassis while connected
#     to Domain 2 equipment. This re-establishes the ground loop that the
#     alumina disk and isolation transformer are there to break.
#   - Rack chassis is Domain 1 (earth ground). Metal rack shelves holding
#     Domain 2 equipment (iso xfmr, readout) must not create a ground
#     path — use insulating feet or a non-conductive shelf liner.
# ===========================================================================

overrides:
  - assembly: rack-utilities
    part: Equipment Rack (19" Standard)
    pn: VR3100
    vendor: Vertiv
    url: https://www.vertiv.com/en-us/products-catalog/facilities-enclosures-and-racks/racks-and-containment/vertiv-vr-rack/
    unit_cost_usd: 1500
    lead_time_weeks: 1
    status: planned
    notes: >
      Vertiv VR3100: 42U, 600mm W x 1100mm D, standard 19" rack. 3,000 lbs
      static load capacity. 77% perforated front/rear doors, EIA-310D rails,
      split rear doors, tool-less mounting, 3-year warranty.
      Vertiv may supply from demo floor stock — confirm before ordering.

  - assembly: rack-utilities
    part: Rack PDU (Metered)
    pn: VP8830
    vendor: Vertiv (Geist)
    url: https://www.vertiv.com/en-us/products-catalog/critical-power/power-distribution/vertiv-monitored-rack-pdu/
    unit_cost_usd: 510
    lead_time_weeks: 1
    status: planned
    notes: >
      Vertiv Geist VP8830: Monitored rack PDU, 20A / 120V, 24x NEMA 5-20R,
      1.9 kW max. 0U vertical mount. Unit-level current monitoring with
      high-visibility LED display, dual Ethernet ports, SNMP/web interface.
      Upgradeable firmware. 5-year warranty (if registered within 120 days).
      NEMA L5-20P twist-lock input, 10 ft cord.
      Useful for tracking load budget during demo — compressor alone is
      ~12.5A on 120V, need to watch headroom for instruments.
      Upgrade option: VP8930 (switched) adds per-outlet on/off and remote
      reboot capability (~$877).

