  # ============================================================
  # MAGNETIC SHIELDING
  # ============================================================
  - name: magnetic-shielding
    description: >
      Ambient field attenuation to < 5 uT at DUT (target < 100 nT with Pb shield).
      FINEMET nanocrystalline ribbon at 40 K, superconducting lead at 4 K.
    items:
      - part: FINEMET Nanocrystalline Ribbon
        pn: FT-3M
        vendor: Proterial (formerly Hitachi Metals)
        url: https://www.proterial.com/e/products/soft_magnetism/finemet.html
        order_url: https://www.mouser.com/new/proterial/hitachi-metals-finemet-ft-3k50t-f/
        qty: 1
        unit_cost_usd: 800
        lead_time_weeks: 2
        stage: "40K"
        status: planned
        notes: >
          High-permeability nanocrystalline ribbon, wrapped as a cylinder on the
          40 K radiation shield. Better shielding factor per layer than mu-metal,
          no degaussing needed after forming. 2-3 wraps should give > 40 dB
          attenuation. Confirm dimensions once cryostat bore is known.
          Order from Mouser (Proterial authorized distributor) or Digikey for
          quick stock. Mouser Proterial catalog: https://www.mouser.com/manufacturer/proterial/

      - part: Lead Foil (Superconducting Shield)
        pn: 012051.GH
        vendor: Thermo Scientific (Alfa Aesar Puratronic)
        url: https://www.thermofisher.com/order/catalog/product/012051.GH
        qty: 1
        unit_cost_usd: 30
        lead_time_weeks: 1
        stage: "4K"
        status: planned
        notes: >
          Pb foil, 0.1 mm thick, 99.998% purity (Puratronic), 100 x 100 mm.
          Wrapped around DUT stage at 4 K. Tc = 7.2 K — standard purity
          Pb goes superconducting the same as 5N. Alfa Aesar 012051.GH
          ($354 for 100x100mm) or 012051.FI ($136 for 50x50mm). May need
          2 sheets to cover DUT stage. 5N purity only needed for ultra-
          sensitive physics.

