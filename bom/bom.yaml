      - part: Coaxial Cables (RF/Clock)
        pn: null
        vendor: Pasternack / Mini-Circuits
        url: https://www.pasternack.com
        qty: 0
        unit_cost_usd: 50
        lead_time_weeks: 1
        stage: "300K-4K"
        status: planned
