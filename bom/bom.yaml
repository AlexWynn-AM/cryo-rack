          and RTD inputs. Ethernet + USB. Well-established Lake Shore
          alternative at roughly half the cost. Sufficient for 2 sensors
          (4 K + 40 K) and optional heater control.
          Alternatives: Lake Shore 335 (~$3.5-4k, 75 W heater) if Lake Shore
          ecosystem preferred; Lake Shore 224 (~$2-2.5k) if monitor-only
          (no heater) is acceptable. If CCS-100 cryostat is selected, a
          controller may be included — confirm before ordering.

