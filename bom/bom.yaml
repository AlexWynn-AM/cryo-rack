      - part: Coaxial Cables (RF/Clock)
        pn: null
        vendor: Pasternack / Mini-Circuits
        url: https://www.pasternack.com
        qty: 0
        unit_cost_usd: 50
        lead_time_weeks: 1
        stage: "300K-4K"
        status: planned
        notes: >
          DEFERRED — define count and type based on DUT requirements.
          Standard UT-085-SS semi-rigid stainless coax, ~$50/m from
          Pasternack or Mini-Circuits. Same SS construction as specialty
          cryo coax at a fraction of the cost.

      - part: PCB DUT Mount / Chip Carrier
        pn: CUSTOM
        vendor: Custom / PCBWay
        url: https://www.pcbway.com
        qty: 2
        unit_cost_usd: 200
        lead_time_weeks: 2
        stage: "4K"
        status: planned
        notes: >
          CUSTOM PCB — design once DUT pinout is known.
          Custom PCB on copper mount for wirebonded AQFP die. Gold-plated
          pads, SMA edge-launch connectors for RF. Order 2 for a spare.
          DUT-to-sample-stage adapter bracket can be 3D printed in PLA —
          easy to iterate as DUT pinout changes. Order from PCBWay
          (pcbway.com) or JLCPCB with gold finish (ENIG).

      - part: MLI Blankets (Multi-Layer Insulation)
        pn: DIY
        vendor: "DIY or Dunmore / FrakoTerm"
        url: https://hydrogen.wsu.edu/2020/06/16/how-to-make-cryogenic-multi-layer-insulation-mli-shields/
        qty: 1
        unit_cost_usd: 100
        lead_time_weeks: 1
        stage: "40K"
        status: planned
        notes: >
          10-layer aluminized mylar + polyester netting for 40 K radiation
          shield. CRITICAL for shields larger than Ø150mm — see thermal
          budget appendix. For Ø200-300mm shield, need ~2 m² of each material.
          DIY option (~$50-75): aluminized mylar photo-film (Amazon) +
          100% polyester mosquito netting (Joann Fabric). WSU HYPER lab
          tested this vs professional MLI and found comparable performance.
          Professional option (~$300-500): double-aluminized PET from
          Dunmore Aerospace (dunmore.com, Bristol PA) + Dacron netting.
          Or pre-made custom blankets from FrakoTerm (frakoterm.com).
          Installation: wear gloves, stagger seams, don't crumple.
          Use mylar tape on seams, leave small gaps for pump-out.
          Anchor with pipe cleaners or wire ties (not metal screws).

  # ============================================================
  # TEMPERATURE MONITORING (part of rack build)
  # ============================================================
  - name: temperature-monitoring
    description: >
      Sensors and controller integrated into the cryostat for temperature
      readout and heater control. Part of the rack build.
    items:
      - part: Silicon Diode Temperature Sensor (4 K)
        pn: DT-670-CU-1.4L
        vendor: Lake Shore Cryotronics
        url: https://www.lakeshore.com/products/categories/overview/temperature-products/cryogenic-temperature-sensors/dt-670-silicon-diodes
        order_url: https://shop.lakeshore.com/temperature-products/temperature-sensors/silicon-diodes.html
        qty: 2
        unit_cost_usd: 50
        lead_time_weeks: 1
        stage: "4K"
        status: planned
        notes: >
          DT-670 standard curve, copper canister. 1 on second stage, 1 on
          DUT mount. ±0.5 K accuracy at 4.2 K with standard Curve 670;
          adequate for confirming base temperature. Individually calibrated
          units (~$100 each) get ±25 mK if needed later. Cernox not required
          — only needed for sub-1 K work or precision thermometry.

      - part: Silicon Diode Temperature Sensor (40 K)
        pn: DT-670-CU-1.4L
        vendor: Lake Shore Cryotronics
        url: https://www.lakeshore.com/products/categories/overview/temperature-products/cryogenic-temperature-sensors/dt-670-silicon-diodes
        order_url: https://shop.lakeshore.com/temperature-products/temperature-sensors/silicon-diodes.html
        qty: 1
        unit_cost_usd: 50
        lead_time_weeks: 1
        stage: "40K"
        status: planned
        notes: "Si diode for first-stage temperature monitoring. Same part as 4K sensors."

      - part: Temperature Controller
        pn: Model 22C
        vendor: Cryocon (Cryogenic Control Systems)
        url: https://us.cryocon.com/M22CProdFolder.php
        qty: 1
        unit_cost_usd: 2500
        lead_time_weeks: 2
        stage: "300K"
        status: planned
        notes: >
          2-input, 2 control loops, 50 W heater output. Supports Si diode
          and RTD inputs. Ethernet + USB. Well-established Lake Shore
          alternative at roughly half the cost. Sufficient for 2 sensors
          (4 K + 40 K) and optional heater control.
          Alternatives: Lake Shore 335 (~$3.5-4k, 75 W heater) if Lake Shore
          ecosystem preferred; Lake Shore 224 (~$2-2.5k) if monitor-only
          (no heater) is acceptable. If CCS-100 cryostat is selected, a
          controller may be included — confirm before ordering.

  # ============================================================
  # R&D / TEST EQUIPMENT (not part of rack build)
  # ============================================================
  - name: test-equipment
    description: >
      Electrical test instruments for AQFP characterization. NOT part of
      the rack build — these are lab/bench equipment used alongside the rack.
      See ADR-003 for selection rationale and Phase 2 options (OCTOPUX, QDAC-II).
      Minimum need for rack commissioning: a current source and voltmeter to
      evaluate power/ground cleanliness. The Yokogawa GS200 + Keithley 2182A
      are the known standard for SC IV measurements.
    items:
      - part: DC Voltage/Current Source
        pn: GS210
        vendor: Yokogawa
        url: https://tmi.yokogawa.com/us/solutions/products/generators-sources/programmable-dc-sources/gs200/
        qty: 1
        unit_cost_usd: 4000
        lead_time_weeks: 2
        stage: "300K"
        status: planned
        notes: >
          Known standard for SC IV measurements. Low-noise DC source,
          ±32 V / ±200 mA, 100 µVp-p noise. Also useful for evaluating
          power/ground cleanliness of the rack wiring. No good COTS
          alternative below this price point for SC work.

      - part: Nanovoltmeter
        pn: 2182A
        vendor: Keithley / Tektronix
        url: https://www.tek.com/en/products/keithley/low-level-sensitive-and-specialty-instruments/nanovoltmeter-model-2182a
        qty: 1
        unit_cost_usd: 6700
        lead_time_weeks: 2
        stage: "300K"
        status: planned
        notes: >
          Known standard for SC voltage readout. 1 nV sensitivity,
          15 nV p-p noise. Budget alternative: Keithley DMM6500 (~$1.9k,
          100 nV sensitivity) for initial bring-up.

  # ============================================================
  # RACK & UTILITIES
  # ============================================================
  - name: rack-utilities
    description: >
      Physical rack frame, power distribution, and cabling.
    items:
      - part: Equipment Rack (19" Standard)
        pn: VR3100
        vendor: Vertiv
        url: https://www.vertiv.com/en-us/products-catalog/facilities-enclosures-and-racks/racks-and-containment/vertiv-vr-rack/
        qty: 1
        unit_cost_usd: 1500
        lead_time_weeks: 1
        stage: "300K"
        status: planned
        notes: >
          Vertiv VR3100: 42U, 600mm W x 1100mm D, standard 19" rack.
          3,000 lbs static load capacity. 77% perforated front/rear
          doors, EIA-310D rails, split rear doors, tool-less mounting,
          3-year warranty. Vertiv may supply from demo floor stock at
          their site — confirm before ordering.

      - part: Rack PDU (Metered)
        pn: VP8830
        vendor: Vertiv (Geist)
        url: https://www.vertiv.com/en-us/products-catalog/critical-power/power-distribution/vertiv-monitored-rack-pdu/
        qty: 1
        unit_cost_usd: 510
        lead_time_weeks: 1
        stage: "300K"
        status: planned
        notes: >
          Vertiv Geist VP8830: Monitored rack PDU, 20A / 120V, 24x
          NEMA 5-20R, 1.9 kW max. 0U vertical mount. Unit-level current
          monitoring with LED display, dual Ethernet, SNMP/web. NEMA
          L5-20P twist-lock input, 10 ft cord. 5-year warranty.
          Upgrade option: VP8930 (switched, ~$877) adds per-outlet
          on/off and remote reboot.

      - part: "Isolation Transformer (Readout Electronics)"
        pn: IS500HG
        vendor: Tripp Lite
        url: https://www.tripplite.com/isolation-transformer-hospital-medical-500w-120v-4-outlet-hg~IS500HG
        qty: 1
        unit_cost_usd: 250
        lead_time_weeks: 1
        stage: "300K"
        status: planned
        notes: >
          Medical-grade Faraday-shielded isolation transformer for readout
          electronics only (Option B ground architecture — see ADR-004).
          500 W, 120 V input/output, 4 outlets, UL 60601-1, leakage
          current <100 µA. Isolates the measurement ground domain from
          building mains earth. Compressor stays on direct mains (earth-
          grounded). 1U–2U rack shelf. Upgrade to IS1000HG (1 kW, ~$400)
          if readout hardware exceeds 500 W. Critical: no readout cable
          shield or ground lug may touch cryostat body or rack chassis.

      - part: KF/CF Vacuum Fittings and Hardware
        pn: various
        vendor: Kurt Lesker
        url: https://www.lesker.com/vacuum-flanges-components.cfm
        qty: 1
        unit_cost_usd: 800
        lead_time_weeks: 1
        stage: "300K"
        status: planned
        notes: >
          KF-25 and KF-40 flanges, centering rings, clamps, bellows hose for
          turbo-to-cryostat pumping line, plus blanks and adapters.
          Stock items from Lesker — ships same week.
          If going semi-custom cryostat route (option B), also need CF-to-KF
          adapters for the vacuum vessel ports.

      - part: Pressure Relief Valve (Spring, KF-25)
        pn: BMT-PRV-S-KF25
        vendor: bmotiontech
        url: https://bmotiontech.com/products/bmotiontech-kf25-flange-pressure-relief-valve-for-vacuum-chamber-improved-version-1-5-psig
        qty: 1
        unit_cost_usd: 60
        lead_time_weeks: 1
        stage: "300K"
        status: planned
        notes: >
          SAFETY. Spring-loaded SS304 relief valve on KF-25 port, opens
          at 1.5 psig. Vents if cold head leaks He into vacuum space.
          Required on any sealed cryostat. Single-piece CNC body,
          improved version with fewer leak points. $60 — no need for
          UHV burst disc ($728 Ideal Vacuum P107378) since cryostat
          uses Viton seals and cryopumping maintains vacuum at 4 K.
          Alternative source: USA Lab KF25 pressure release valve
          (Amazon, similar price).

      - part: CF Copper Gaskets (Consumable)
        pn: GA-0800
        vendor: Kurt Lesker
        url: https://www.lesker.com/flanges/hardware-cf-gaskets/part/ga-0800
        qty: 10
        unit_cost_usd: 20
        lead_time_weeks: 1
        stage: "300K"
        status: planned
        notes: >
          Kurt Lesker GA-0800: OFHC copper CF gaskets for 8" (DN160)
          flanges, 6.743" OD, 6.007" ID, 10/pkg. Also available:
          VZCUA150 (annealed, 5/pkg) for fragile components. For smaller
          flanges:
          For permanent joints (bottom plate, feedthrough ports).
          The sample-access joint (top plate to vessel body) should use a
          Viton O-ring groove instead — reusable, ~1e-7 Torr, adequate
          since cryopumping at 4K maintains vacuum. Machine an O-ring
          groove into the top plate or vessel body top flange face.
          Viton O-rings are ~$2 each and last dozens of cycles.

      - part: Indium Wire (Thermal Interface)
        pn: 02-39-001
        vendor: CMR Direct
        url: https://www.cmr-direct.com/en/indium-wire
        qty: 1
        unit_cost_usd: 80
        lead_time_weeks: 1
        stage: "4K/40K"
        status: planned
        notes: >
          CMR Direct 02-39-001: 1.0 mm diameter, 10 m spool, 99.99%
          purity, $433. Crushed between bolted cryo joints for thermal
          contact: cold head → thermal strap, thermal strap → radiation
          shield, cold finger → sample stage. Standard cryo practice.
          Also useful: Apiezon N grease as backup.

      - part: Wire Heat Sinking Supplies
        pn: various
        vendor: Lake Shore / CMR Direct
        url: https://www.cmr-direct.com/
        qty: 1
        unit_cost_usd: 100
        lead_time_weeks: 1
        stage: "40K"
        status: planned
        notes: >
          GE varnish (or Stycast 2850FT), Kapton tape for thermally
          anchoring DC wires and coax to the 40 K radiation shield.
          Prevents 300 K heat from conducting straight to 4 K.
          Wire routing bobbins and clamps can be 3D printed in PLA
          (validated at 4K — low thermal conductivity is a feature).
          Print custom geometry to match wire count and routing.

      - part: Miscellaneous Hardware
        pn: various
        vendor: McMaster-Carr / Thorlabs
        url: https://www.mcmaster.com
        qty: 1
        unit_cost_usd: 500
        lead_time_weeks: 1
        stage: "300K"
        status: planned
        notes: "Screws, brackets, cable ties, BNC/SMA adapters, rack shelves, etc."
