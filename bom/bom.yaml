      See ADR-003 for selection rationale and Phase 2 options (OCTOPUX, QDAC-II).
      Minimum need for rack commissioning: a current source and voltmeter to
      evaluate power/ground cleanliness. The Yokogawa GS200 + Keithley 2182A
      are the known standard for SC IV measurements.
