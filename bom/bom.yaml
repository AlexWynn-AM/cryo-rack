# Cryo Rack Master BOM
# Machine-readable bill of materials for cryogenic demonstration rack.
# All costs in USD. Lead times in weeks. Status: planned | quoting | quoted | ordered | received.
# Costs are rough estimates for budgeting; get actual quotes before ordering.

project: cryo-rack
revision: "0.7"
date: "2026-03-10"
target_build_date: "2026-04-10"

assemblies:

