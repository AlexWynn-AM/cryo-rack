        notes: >
          0.5-1.0 mm diameter indium wire, ~1 m. Crushed between bolted
          cryo joints for thermal contact: cold head → thermal strap,
          thermal strap → radiation shield, cold finger → sample stage.
          Standard cryo practice. Also useful: Apiezon N grease as backup.

      - part: Wire Heat Sinking Supplies
        pn: null
        vendor: Lake Shore / CMR Direct
