      - part: Phosphor Bronze Wiring Loom (DC)
        pn: WQL-36-100
        vendor: Lake Shore Cryotronics
        url: https://shop.lakeshore.com/temperature-products/cryogenic-accessories/cryogenic-wire/quad-lead.html
        qty: 1
        unit_cost_usd: 50
        lead_time_weeks: 1
        stage: "300K-4K"
        status: planned
