  # ============================================================
  # CRYOSTAT — MODULAR BUILD FROM STANDARD PARTS
  # ============================================================
  # Design philosophy: all vacuum hardware is standard CF/KF catalog items
  # from multi-source vendors (Lesker, MDC, Nor-Cal, Ideal Vacuum).
  # Only the radiation shield and sample stage are custom machined
  # (simple aluminum/copper parts any machine shop can make).
  # No single-vendor lock-in. Every piece can be re-sourced.
  #
  # Architecture: top-loading, cold head hangs from top plate.
  # Cold end points down. Feedthroughs on top plate or side ports.
  # Radiation shield (Al) bolted to 1st stage. Sample stage (Cu)
  # bolted to 2nd stage. Pumping via KF-25 port on body or base.
  # ============================================================
  - name: cryostat-vessel
    description: >
      Modular cryostat built from standard CF/KF vacuum components.
      Top-loading design: RDK-101D cold head mounts through top plate,
      feedthroughs on top plate or side stubs, pumping on base/side.
      Vacuum vessel is 300K stainless (fine — only the cold internals
      need aluminum/copper). Target sample space >= Ø80 x 120 mm.
    items:
      - part: "Vacuum Vessel Body (CF Nipple or 6-Way Cross)"
        pn: FN-0800
        vendor: Kurt Lesker
        url: https://www.lesker.com/newweb/flanges/fittings_cf_nipples.cfm?pgid=full
        qty: 1
        unit_cost_usd: 1500
        lead_time_weeks: 1
        stage: "300K"
        status: planned
        notes: >
          Stock stainless CF chamber. Two approaches:
          (A) CF nipple (6" OD tube, 8" CF flanges top/bottom) with KF stubs
          welded on for pumping + gauge — simple, cheap (~$600-1000). Use
          Lesker Nipple Builder for custom lengths. Have a shop weld 2-3
          KF-25/KF-40 stubs onto the tube wall for side access.
          (B) 6-way cross, 8" CF (Nor-Cal 6C-600) — 6 ports, no welding
          needed, but heavier and ~$3800. More ports than we likely need.
          Recommendation: option (A) — stock CF nipple + welded KF stubs.
          Internal clearance: 6" OD tube = ~140 mm ID, sufficient for
          Ø80-100mm radiation shield + FINEMET wrap.
          Stainless is fine for the 300K vacuum jacket; thermal conductivity
          only matters for the cold internals (shield, stage).

      - part: "Top Plate (Multiport Cluster Flange or Bored Blank)"
        pn: F0800X000N
        vendor: Kurt Lesker
        url: https://www.lesker.com/flanges/flanges-cf-304ss/part/f0800x000n
        qty: 1
        unit_cost_usd: 800
        lead_time_weeks: 2
        stage: "300K"
        status: planned
        notes: >
          8" CF (DN160) flange with center bore for RDK-101D cold head and
          surrounding ports for feedthroughs. Options:
          (A) Lesker multiport cluster flange — stock item, center bore +
          4-6 smaller CF ports (CF-16 or CF-40) around perimeter. ~$800-1200.
          (B) Blank 8" CF flange (Lesker F0800X000N, ~$200) machined by a
          shop for cold head bolt pattern + feedthrough ports. Cheaper but
          needs machining.
          RDK-101D bolt pattern from SHI outline drawing (in bom/quotes/).
          Feedthrough ports: 2x CF-16 for D-sub, 2x CF-16 for SMA coax,
          1x KF-25 for pumping/gauge if not on side.
          KEY: If RDK-101D is ordered with CF flange option, center bore is
          a standard CF seal — no custom machining needed. If switching
          cryocoolers later, this top plate is the ONLY cryocooler-specific
          part. New blank CF flange + machining ~$400 total to swap.
          NOTE: BMC401 has a Ø130mm motor housing that doesn't match any
          standard CF size — would need a custom adapter plate machined
          into the top plate. RDK-101D CF option avoids this.

      - part: "Radiation Shield (40K) — Custom Machined Aluminum"
        pn: CUSTOM
        vendor: "Local machine shop / Protolabs / Xometry"
        stock_url: https://www.onlinemetals.com/en/buy/aluminum/4-od-x-0-125-wall-x-3-75-id-aluminum-round-tube-6061-t6-extruded/pid/4741
        qty: 1
        unit_cost_usd: 800
        lead_time_weeks: 2
        stage: "40K"
        status: planned
        notes: >
          CUSTOM MACHINED — raw stock, not a catalog part.
          6061-T6 aluminum cylinder + end caps, thermally anchored to
          RDK-101D 1st stage via OFHC copper thermal strap. Simple turned
          part — any CNC shop can make this. Target dimensions: ~Ø100 mm OD
          × 150-200 mm tall (sized to fit inside vacuum vessel with clearance
          for FINEMET wrap on outside). Bottom cap has clearance hole for
          2nd stage penetration. Top cap has clearance for cold head body.
          Gold-plated or polished interior for low emissivity (optional).
          Design once cold head outline drawing dimensions are confirmed.
          Protolabs/Xometry for fast-turn; local shop for best price.
          RAW STOCK: 6061-T6 round tube, 4" OD × 1/8" wall (~$41/pc,
          Online Metals pid/4741). End caps from 6061 plate or disc.

      - part: "Sample Stage (4K) — Custom Machined Copper"
        pn: CUSTOM
        vendor: "Local machine shop"
        stock_url: https://shop.southerncopper.com/products/c10100-oxygen-free-copper-round-bar
        qty: 1
        unit_cost_usd: 400
        lead_time_weeks: 2
        stage: "4K"
        status: planned
        notes: >
          CUSTOM MACHINED — raw stock, not a catalog part.
          OFHC copper plate/block, gold-plated. Provides thermal mass and
          mounting surface for DUT PCB carrier. Connects to 2nd stage cold
          finger THROUGH the alumina isolation disk (see below). Tapped
          holes for PCB standoffs and Pb foil shield bracket. Simple part.
          Target: ~Ø50 mm × 20 mm thick, with M3/M4 tapped holes.
          RAW STOCK: C10100 OFHC copper 2" round bar ($231 for 12 ft,
          Southern Copper). Only need ~1" length — CBA machine shop
          likely has scrap C101 on hand.

      - part: "Cryostat Mounting Frame (Aluminum Sheet)"
        pn: CUSTOM
        vendor: "Local sheet metal shop / SendCutSend / Xometry"
        url: https://sendcutsend.com/materials/6061-aluminum/
        qty: 1
        unit_cost_usd: 300
        lead_time_weeks: 2
        stage: "300K"
        status: planned
        notes: >
          CUSTOM FABRICATED — raw stock, not a catalog part.
          6061-T6 aluminum plate, 6mm (1/4") thick, laser cut and bent.
          Rectangular plate (~525 x 1040 mm) with center cutout for DN320CF
          vessel flange (Ø328mm hole with 40mm lip). Four bent mounting tabs
          (4U tall, 44mm wide) bolt to front and rear 19" rack rails at
          standard M6 spacing. Corner relief holes for stress reduction.
          Triangular gussets welded at tab bases for rigidity.
          Total weight ~15 kg. Supports ~100 kg cryostat load.
          CAD model: cad/assembly/cryostat-assembly.py (MountingFrame).
          Can be fabricated by any sheet metal shop with laser cutter and
          brake press. SendCutSend for fast-turn prototype (~$200-400
          depending on complexity). Local shop for production.

      - part: "Alumina Electrical Isolation Disk (4K)"
        pn: "65631"
        vendor: CoorsTek
        url: https://www.amazon.com/CoorsTek-High-Alumina-Disc/dp/B00B2PKVTC
        qty: 1
        unit_cost_usd: 30
        lead_time_weeks: 1
        stage: "4K"
        status: planned
        notes: >
          CoorsTek 65631: AD-998 high alumina (99.8% Al₂O₃) disc, 25 mm
          OD, 2 mm thick. Available on Amazon (~$15-20). Inserted between
          the 2nd-stage cold finger and the copper backplane/sample stage.
          Breaks the galvanic path between the cryocooler structure
          (earth-grounded through compressor) and the AQFP circuit ground
          (isolated measurement domain). Thermal conductivity 10–30 W/m·K
          at 4 K — adequate since indium foil interface resistance
          dominates. Use 0.1 mm indium foil on both faces with high
          clamping force. Expected temperature rise: fraction of a kelvin.
          Alternative: Valley Design polished 99.6% alumina substrate
          (custom sizes, 1 mm thick option). See ADR-004 and
          docs/ground_isolation_memo.docx for full rationale.

  # ============================================================
  # VACUUM PUMPING, GAUGES, FEEDTHROUGHS
  # ============================================================
  - name: vacuum-plumbing
    description: >
      Pumping, gauges, and feedthroughs. All standard catalog items
      from multiple vendors — no single-source risk.
    items:
      - part: "Vacuum Pumping: Turbo Station (Pfeiffer HiCube 80 Eco)"
        pn: PM015888-T
        vendor: Pfeiffer Vacuum
        url: https://www.pfeiffer-vacuum.com/en/products/vacuum-generation/pumping-stations/turbo-pumping-stations/hicube-eco/20016/hicube-80-eco-dn-40-iso-kf-mvp-015-2
        order_url: https://www.idealvac.com/en-us/Pfeiffer-HiCube-80-Eco-Benchtop-Turbomolecular-Pump-Station-KF40-MVP-015-2-Diaphragm-PN:-PM-015-888-AT/pp/P107317
        qty: 1
        unit_cost_usd: 7900
        lead_time_weeks: 1
        stage: "300K"
        status: planned
        notes: >
          Integrated turbo + diaphragm backing pump + controller + gauge
          in one box. Ultimate: <1e-8 Torr. HiPace 80 turbo (67 L/s) +
          MVP 015 diaphragm backing pump. 30 lb, ~50 dB, plug-and-play.
          Reaches 1e-5 Torr in ~20-30 min — faster cooldown due to
          less residual gas conduction. Good for fast cycling (2x/day).
          Smallest/cheapest integrated turbo station from a major vendor.
          Diaphragm backing pump is small (15 L/min) — initial roughing
          from atmosphere is slower than a dedicated scroll pump.
          Street price ~$8-9k from Ideal Vacuum or High Vac Depot.

      - part: "Vacuum Pumping Alt: Scroll Only (Edwards nXDS6i)"
        pn: nXDS6i
        vendor: Edwards Vacuum
        url: https://www.edwardsvacuum.com/en/our-products/dry-scroll-pumps/nxds-dry-scroll-pumps
        order_url: https://www.idealvac.com/en-us/vacuum-products/pl/1362-8-117-245-960
        qty: 0
        unit_cost_usd: 5900
        lead_time_weeks: 1
        stage: "300K"
        status: planned
        notes: >
          Budget alternative — scroll pump only, no turbo. Ultimate:
          0.015 Torr. 100 L/min, 260 W, 120/240 V auto-sensing, 52 dB,
          58 lb. Tip seal life 12,000-16,000 hr. Adequate for infrequent
          cycling (1x/day). Cooldown ~30-60 min longer vs turbo due to
          higher starting pressure. Saves ~$2k vs HiCube.

      - part: Vacuum Gauge (Convection Pirani)
        pn: CVM211GAL
        vendor: InstruTech
        url: https://www.instrutechinc.com/products/convection-and-pirani-capacitance-vacuum-gauges/cvm211-stinger-convection
        order_url: https://highvacdepot.com/product/instrutech-stinger-convection-gauge-series-211/
        qty: 1
        unit_cost_usd: 400
        lead_time_weeks: 1
        stage: "300K"
        status: planned
        notes: >
          Integrated gauge + display, atm to 1e-4 Torr. Available with KF25 fitting.
          Sufficient for pumpdown monitoring. Cryopumping maintains UHV at 4 K;
          no cold cathode needed for operation.

      - part: Electrical Feedthroughs (DC, Multi-pin)
        pn: IFDGG251056
        vendor: Kurt Lesker
        url: https://www.lesker.com/feedthroughs/instrument-feedthroughs-mpdt-subd/part/ifdgg251056
        qty: 2
        unit_cost_usd: 500
        lead_time_weeks: 2
        stage: "300K"
        status: planned
        notes: >
          Kurt Lesker IFDGG251056: D-sub 25-pin hermetic feedthrough on
          DN63CF (4.50" OD) flange, $510 each. 500 VDC, 5A/pin, glass-
          ceramic insulator, gold-plated NiFe conductors. 2 units gives
          50 pins — sufficient for DC bias (16 wires) + temp sensors
          (8 wires) + spares. Ceramic-to-metal seals are inherently
          isolated from the flange body, preserving the ground isolation
          architecture — no coax shield or cable braid should connect to
          the flange housing.

