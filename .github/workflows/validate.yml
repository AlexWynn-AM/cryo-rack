name: Validate BOM & Build PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install test dependencies
        run: pip install pytest

      - name: Validate BOM schemas
        run: python scripts/validate_bom.py

      - name: Run BOM summary (smoke test)
        run: python scripts/bom_summary.py bom/bom.yaml

      - name: Run test suite
        run: python -m pytest tests/ -v

      - name: Install system dependencies for PDF generation
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libfontconfig1

      - name: Build PDF design package
        run: python scripts/build_pdf.py -o cryo-rack-design-package.pdf

      - name: Upload PDF artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cryo-rack-design-package
          path: cryo-rack-design-package.pdf
          retention-days: 30
